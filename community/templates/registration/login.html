{% extends 'home/base.html' %}

{% block title %}Sign In{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto w-full max-w-md">
        <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900 tracking-tight">
            Sign in to your account
        </h2>
    </div>

    <div class="mt-8 sm:mx-auto w-full max-w-md">
        <div class="bg-white py-8 px-4 shadow-sm border border-gray-200 rounded-2xl sm:px-10">

            {% if form.errors %}
            <div class="mb-4 p-4 rounded-lg bg-red-50 text-sm text-red-700 font-medium">
                Your username and password didn't match. Please try again.
            </div>
            {% endif %}

            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700">Username</label>
                    <div class="mt-1">
                        <input id="id_username" name="username" type="text" required
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>
                </div>

                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700">Password</label>
                    <div class="mt-1">
                        <input id="id_password" name="password" type="password" required
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-xs text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center text-sm">
                <span class="text-gray-600">Don't have an account?</span>
                <a href="{% url 'register' %}" class="font-semibold text-indigo-600 hover:text-indigo-500 ml-1">Sign
                    up</a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
