<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Community Event Board{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    {% if request.resolver_match.url_name != 'login' and request.resolver_match.url_name != 'register' %}
    <nav
        class="bg-white border-b border-gray-200 py-4 px-8 flex justify-between items-center shadow-xs sticky top-0 z-50">
        <a href="{% url 'home' %}" class="text-xl font-bold text-indigo-600 tracking-tight flex items-center gap-2">
            MeetGrid
        </a>

        <div class="hidden sm:block w-96">
            <input type="text" placeholder="Search events by title or location..."
                class="w-full px-4 py-1.5 bg-gray-100 border border-transparent rounded-lg focus:bg-white focus:border-indigo-500 outline-none text-sm transition">
        </div>

        <div class="flex items-center gap-4">
            {% if user.is_authenticated %}
            <span class="text-sm text-gray-600 font-medium">Hi, {{ user.username }}</span>
            <form method="POST" action="{% url 'logout' %}" class="inline">
                {% csrf_token %}
                <button type="submit"
                    class="text-sm font-medium text-gray-700 hover:text-indigo-600 bg-transparent border-none cursor-pointer">
                    Logout
                </button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" class="text-sm font-medium text-gray-700 hover:text-indigo-600">Login</a>
            <a href="{% url 'register' %}"
                class="text-sm font-medium bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">Sign
                Up</a>
            {% endif %}
        </div>
    </nav>
    {% endif %}

    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

</body>

</html>
