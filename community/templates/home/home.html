{% extends 'home/base.html' %}

{% block title %}Welcome to MeetGrid{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col items-center justify-center text-center px-6">
    <div class="max-w-3xl space-y-4">
        <h1 class="text-5xl font-extrabold text-gray-900 tracking-tight">
            Welcome to <span class="text-indigo-600">MeetGrid</span>
        </h1>
        <p class="text-lg text-gray-500 max-w-2xl mx-auto">
            Discover upcoming local workshops, community gatherings, and events happening around you.
        </p>
    </div>

    <div class="mt-10 flex gap-4">
        <a href="{% url 'create_event' %}"
            class="px-6 py-3 font-semibold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 shadow-md transition">
            Create Event
        </a>
        <a href="{% url 'events_page' %}"
            class="px-6 py-3 font-semibold rounded-xl text-gray-700 bg-white border border-gray-200 hover:bg-gray-50 shadow-sm transition">
            Browse Events
        </a>
    </div>
</div>
{% endblock %}
